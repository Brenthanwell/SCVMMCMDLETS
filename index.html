document.getElementById('total-count').textContent = CMDLETS.length;
function getVerb(n){var m=n.match(/^([A-Za-z]+)-/);return m?m[1]:'Other';}
function guessType(v){
  if(/^(ID$|.*ID$|.*Id$)/.test(v))return'Guid';
  if(/^(Name|Description|Status|Model|Manufacturer|UserName|Domain|.*Name$|.*Type$|.*String$|.*Path$|Key|Value|Message|Url|URL|FQDN|ComputerName|Server|Version|Release)/.test(v))return'String';
  if(/^(CPU|Memory|Storage|Count|Port|MB|GB|IOPS|Size|Free|Used|Total|Available|Timeout|Rating|Aggre|Frequency|Metric|Capacity|Bandwidth|Instance)/.test(v))return'Int32';
  if(/^(Enabled|Is|Dynamic|Active|Auto|Mainte|Power|Fixed|VHD|VHDX)/.test(v))return'Boolean';
  if(/^(Start|End|Creation|Expir|Last|Timestamp|Check)/.test(v))return'DateTime';
  if(/^(IPv4|IP|Address|Gateway|Subnet|DNS|Peer|Ext|Int|Router)/.test(v))return'IPAddress';
  return'Object';
}
var activeItem=null,filtered=CMDLETS.slice();
function renderList(){
  var list=document.getElementById('cmdletList');
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  filtered=q?CMDLETS.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0||c.vars.some(function(v){return v.toLowerCase().indexOf(q)>=0});}):CMDLETS.slice();
  document.getElementById('resultsCount').innerHTML=q?'<em>'+filtered.length+'</em> of '+CMDLETS.length+' cmdlets':'<em>'+CMDLETS.length+'</em> cmdlets total';
  if(filtered.length===0){list.innerHTML='<div class="no-results">No results for "'+q+'"</div>';return;}
  var html='';
  if(!q){
    var groups={};
    filtered.forEach(function(c){var v=getVerb(c.name);if(!groups[v])groups[v]=[];groups[v].push(c);});
    Object.keys(groups).sort().forEach(function(verb){
      html+='<div class="group-header">'+verb+'-</div>';
      groups[verb].forEach(function(c){
        var noun=c.name.replace(/^[A-Za-z]+-/,'');
        html+='<div class="cmdlet-item'+(activeItem===c.name?' active':'')+'" onclick="showDetail(\''+c.name+'\')"><div class="cmdlet-name"><span class="cmd-verb">'+verb+'-</span><span class="cmd-noun">'+noun+'</span></div><div class="cmdlet-var-count">'+c.vars.length+' param'+(c.vars.length!==1?'s':'')+'</div></div>';
      });
    });
  } else {
    filtered.forEach(function(c){
      var verb=getVerb(c.name),noun=c.name.replace(/^[A-Za-z]+-/,'');
      html+='<div class="cmdlet-item'+(activeItem===c.name?' active':'')+'" onclick="showDetail(\''+c.name+'\')"><div class="cmdlet-name"><span class="cmd-verb">'+verb+'-</span><span class="cmd-noun">'+noun+'</span></div><div class="cmdlet-var-count">'+c.vars.length+' param'+(c.vars.length!==1?'s':'')+'</div></div>';
    });
  }
  list.innerHTML=html;
}
function showDetail(name){
  var c=CMDLETS.find(function(x){return x.name===name;});
  if(!c)return;
  activeItem=name;renderList();
  var verb=getVerb(name),noun=name.replace(/^[A-Za-z]+-/,'');
  var cards=c.vars.map(function(v,i){var isMand=c.mandatory&&c.mandatory.indexOf(v)>=0;var t=(c.types&&c.types[i])?c.types[i]:guessType(v);return'<div class="var-card'+(isMand?' var-card-mandatory':'')+'"><div class="var-index">'+(i+1)+'</div><div><div class="var-name">'+v+(isMand?'<span class="mandatory-star">*</span>':'')+' </div><div class="var-type">'+t+'</div></div></div>';}).join('');
  var ps='<span class="ps-comment"># '+name+'</span><br><span class="ps-var">$vmmServer</span> = <span class="ps-param">"YourVMMServer"</span><br><span class="ps-var">$results</span> = <span class="ps-cmd">'+name+'</span> -VMMServer <span class="ps-var">$vmmServer</span><br><br><span class="ps-comment"># Access parameters</span><br><span class="ps-var">$results</span> | <span class="ps-cmd">Select-Object</span> <span class="ps-param">'+c.vars.join(', ')+'</span>';
  var main=document.getElementById('mainContent');
  main.scrollTop=0;
  main.innerHTML='<div class="detail-pane"><div class="detail-header"><div class="detail-badge">SCVMM Cmdlet - '+verb+'</div><div class="detail-title"><span class="dt-verb">'+verb+'-</span><span class="dt-noun">'+noun+'</span></div><div class="detail-meta"><span class="meta-chip">Parameters: <strong>'+c.vars.length+'</strong></span>'+(c.mandatory&&c.mandatory.length?'<span class="mand-count-chip">Required: <strong>'+c.mandatory.length+'</strong></span>':'')+(c.outputType?'<span class="output-type-chip">\u2192 '+c.outputType+'</span>':'')+'<span class="meta-chip">PowerShell 5.1+</span><span class="meta-chip">SC 2025</span></div></div><div class="actions-row"><button class="copy-btn" onclick="copyList(\''+name+'\')">Copy parameter list</button><button class="copy-btn" onclick="copyPS(\''+name+'\')">Copy PS snippet</button></div><div class="vars-section"><div class="section-label">Parameters / Variables</div><div class="var-grid">'+cards+'</div></div><div class="section-label" style="margin-bottom:12px">PowerShell usage</div><div class="ps-block">'+ps+'</div></div>';
}
function copyList(name){
  var c=CMDLETS.find(function(x){return x.name===name;});
  navigator.clipboard.writeText(c.vars.join(', ')).then(function(){
    var btns=document.querySelectorAll('.copy-btn');btns[0].textContent='Copied!';btns[0].classList.add('copied');
    setTimeout(function(){btns[0].textContent='Copy parameter list';btns[0].classList.remove('copied');},2000);
  });
}
function copyPS(name){
  var c=CMDLETS.find(function(x){return x.name===name;});
  var ps='$vmmServer = "YourVMMServer"\n$results = '+name+' -VMMServer $vmmServer\n$results | Select-Object '+c.vars.join(', ');
  navigator.clipboard.writeText(ps).then(function(){
    var btns=document.querySelectorAll('.copy-btn');btns[1].textContent='Copied!';btns[1].classList.add('copied');
    setTimeout(function(){btns[1].textContent='Copy PS snippet';btns[1].classList.remove('copied');},2000);
  });
}
document.getElementById('searchInput').addEventListener('input',function(){
  activeItem=null;renderList();
  document.getElementById('mainContent').innerHTML='<div class="welcome"><div class="welcome-icon">SC</div><h2>Select a cmdlet</h2><p>Browse or search 689 SCVMM cmdlets. Click any entry to view its parameters.</p></div>';
});
renderList();</script>
